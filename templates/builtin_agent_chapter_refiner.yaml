version: 1
id: chapter_refiner
name: Chapter Refiner
description: Refine a full chapter for flow, clarity, continuity, and scene-level cohesion.
applies_when:
  surfaces:
    - chapter_view
  input_scopes:
    - chapter
  min_words: 1000
  max_words: 12000
context_policy:
  required:
    - current_chapter
    - chapter_summary
    - style_sheet
  optional:
    - arc_summary
  forbidden:
    - raw_import_notes
rag_policy:
  mode: none
control:
  output_mode: patch
  requires_acceptance: true
  can_modify_canon: false
output:
  type: revised_text
  requires_diff_preview: true
