version: 3
id: line_polish
name: Line Polish
description: Rewrite selected prose for clarity, cadence, and flow while preserving meaning.
applies_when:
  surfaces:
    - editor
  input_scopes:
    - selection
  min_words: 20
  max_words: 1500
model_requirements:
  min_context_tokens: 2048
  supports_streaming: false
  supports_structured_output: false
context_policy:
  required:
    - selected_text
    - style_sheet
  optional:
    - surrounding_paragraphs
  forbidden:
    - global_codex_rag
    - raw_import_notes
    - prior_chat
context_budget:
  max_input_estimated_tokens: 4096
  reserved_output_estimated_tokens: 1024
rag_policy:
  mode: none
follow_ups:
  on_accept:
    - agent_id: scene_rewrite
      scope: scene
      relationship: triggered
control:
  output_mode: patch
  requires_acceptance: true
  can_modify_canon: false
output:
  type: replacement_text
  requires_diff_preview: true