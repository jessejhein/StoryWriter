id: line_polish
name: Line Polish
description: Rewrite selected prose for clarity, cadence, and flow while preserving meaning.
applies_when:
  surfaces:
    - editor
  input_scope:
    - selection
  min_words: 20
  max_words: 1500
context_policy:
  required:
    - selected_text
    - style_sheet
  optional:
    - surrounding_paragraphs
  forbidden:
    - global_codex_rag
    - raw_import_notes
rag_policy:
  mode: none
control:
  output_mode: patch
  requires_acceptance: true
  can_modify_canon: false
output:
  type: replacement_text
  requires_diff_preview: true
